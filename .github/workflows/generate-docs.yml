name: Generate AsciiDoc Documentation

on:
  push:
    branches:
      - main # Skrypt uruchomi się po każdym pushu na main

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    # Nadanie uprawnień do zapisywania zmian (commitów) w repozytorium
    permissions:
      contents: write 

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Setup Node.js (dla frontendu)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja jsdoc-to-markdown
        run: npm install -g jsdoc-to-markdown

      - name: Setup narzędzia uv (dla backendu)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Instalacja narzędzia Pandoc (do konwersji na AsciiDoc)
        run: sudo apt-get install -y pandoc

      - name: Przygotowanie folderu docs
        run: mkdir -p docs

      - name: Generowanie dokumentacji Backendu (Python)
        run: |
          cd server
          # 1. uv instaluje pydoc-markdown w locie i generuje plik pośredni
          uv run --with pydoc-markdown pydoc-markdown -I . -m db -m main -m routes > backend_temp.md
          # 2. Pandoc konwertuje plik na format AsciiDoc do folderu docs/
          pandoc -f markdown -t asciidoc backend_temp.md -o ../docs/backend.adoc
          rm backend_temp.md

      - name: Generowanie dokumentacji Frontendu (JavaScript)
        run: |
          cd client
          # 1. Wyciągnięcie JSDoc do pliku pośredniego
          jsdoc2md src/**/*.js > frontend_temp.md
          # 2. Pandoc konwertuje plik na format AsciiDoc do folderu docs/
          pandoc -f markdown -t asciidoc frontend_temp.md -o ../docs/frontend.adoc
          rm frontend_temp.md

      - name: Automatyczny Commit i Push wygenerowanych plików
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: Automatyczna generacja dokumentacji AsciiDoc"
          file_pattern: 'docs/*.adoc'
