<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBMP - Graph Based Music Player</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header id="top-bar">
        <div class="logo">
            <h1>GBMP<span class="dot">.</span></h1>
            <div class="site-subtitle">Graph-Based Music Recommender</div>
        </div>
        <nav class="view-switcher">
            <div class="view-controls">
                <button id="nav-recommender" class="nav-btn active">Song Recommender</button>
                <button id="nav-explorer" class="nav-btn">Discover by Tags</button>
            </div>
            
        </nav>
    </header>

    <main id="app-container">
        
        <section id="intro-text" class="fade-in">
            </section>

        <section id="content-top" class="fade-in">
            </section>

        <section id="content-middle" class="fade-in">
            </section>

    </main>

    <section id="content-list">
        </section>

    <script type="module" src="js/app.js"></script>

</body>
</html>
